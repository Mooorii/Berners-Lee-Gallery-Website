<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Berners-Lee Memory Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333333;
            background: linear-gradient(135deg, #87CEEB 0%, #ADD8E6 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(163, 145, 145, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            animation: headerSlideDown 0.8s ease-out;
        }
        @keyframes headerSlideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.8rem;
            font-weight: bold;
            color: #87CEEB;
            text-decoration: none;
            animation: logoGlow 2s ease-in-out infinite alternate;
        }
        @keyframes logoGlow {
            from { text-shadow: 0 0 5px rgba(135, 206, 235, 0.5); }
            to { text-shadow: 0 0 20px rgba(135, 206, 235, 0.8); }
        }
        nav ul {
            display: flex;
            list-style: none;
        }
        nav ul li {
            margin-left: 2rem;
        }
        nav ul li a {
            color: #333;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s, transform 0.3s;
            position: relative;
        }
        nav ul li a:hover {
            color: #87CEEB;
            transform: translateY(-2px);
        }
        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: #87CEEB;
            transition: width 0.3s;
        }
        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: url('https://images.unsplash.com/photo-1513475382585-d06e58bcb0e0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
            background-attachment: fixed;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
        }
        .hero-content {
            position: relative;
            z-index: 1;
            animation: heroFadeIn 1.5s ease-out;
        }
        @keyframes heroFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .cta-btn {
            background: linear-gradient(45deg, #87CEEB, #ADD8E6);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(135, 206, 235, 0.3);
            text-decoration: none;
            display: inline-block;
        }
        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(135, 206, 235, 0.4);
        }

        /* Sections */
        section {
            padding: 5rem 0;
            background: #fefefe;
        }
        section:nth-child(even) {
            background: #f9f9f9;
        }
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: #333;
            position: relative;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(45deg, #87CEEB, #ADD8E6);
            border-radius: 2px;
        }

        /* Memory Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        .memory-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: memoryItemFadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
            position: relative;
        }
        .memory-item:nth-child(1) { animation-delay: 0.1s; }
        .memory-item:nth-child(2) { animation-delay: 0.2s; }
        .memory-item:nth-child(3) { animation-delay: 0.3s; }
        .memory-item:nth-child(4) { animation-delay: 0.4s; }
        .memory-item:nth-child(5) { animation-delay: 0.5s; }
        .memory-item:nth-child(6) { animation-delay: 0.6s; }
        .memory-item:nth-child(7) { animation-delay: 0.7s; }
        .memory-item:nth-child(8) { animation-delay: 0.8s; }
        .memory-item:nth-child(9) { animation-delay: 0.9s; }
        .memory-item:nth-child(10) { animation-delay: 1.0s; }
        .memory-item:nth-child(11) { animation-delay: 1.1s; }
        .memory-item:nth-child(12) { animation-delay: 1.2s; }
        @keyframes memoryItemFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .memory-item:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .memory-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .memory-item:hover img {
            transform: scale(1.1);
        }
        .memory-item .content {
            padding: 1.5rem;
        }
        .memory-item h3 {
            margin-bottom: 0.5rem;
            color: #333;
            font-size: 1.2rem;
        }
        .memory-item .date {
            color: #87CEEB;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .memory-item p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .memory-item .category {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(135, 206, 235, 0.9);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 59, 48, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }
        .memory-item:hover .delete-btn {
            opacity: 1;
            transform: scale(1.1);
        }
        .delete-btn:hover {
            background: rgba(255, 59, 48, 1);
            transform: scale(1.2);
        }

        .source-options {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .source-options label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .add-memory-form {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: formSlideIn 1s ease-out;
        }
        @keyframes formSlideIn {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #87CEEB;
            box-shadow: 0 0 10px rgba(135, 206, 235, 0.2);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        .submit-btn {
            background: linear-gradient(45deg, #87CEEB, #ADD8E6);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(135, 206, 235, 0.3);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(135, 206, 235, 0.4);
        }

        /* Categories */
        .categories {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        .category-btn {
            background: white;
            border: 2px solid #87CEEB;
            color: #87CEEB;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .category-btn:hover, .category-btn.active {
            background: #87CEEB;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(135, 206, 235, 0.3);
        }

        /* About */
        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }
        .about-text {
            animation: aboutTextSlideIn 1s ease-out;
        }
        @keyframes aboutTextSlideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .about-image {
            animation: aboutImageSlideIn 1s ease-out 0.3s both;
        }
        @keyframes aboutImageSlideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .about-image img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 2rem 0;
        }
        footer p {
            margin-bottom: 1rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            animation: modalFadeIn 0.3s ease-out;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            animation: modalZoomIn 0.3s ease-out;
        }
        @keyframes modalZoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close:hover {
            color: #bbb;
        }
        .modal-caption {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 1rem;
            border-radius: 10px;
            max-width: 80%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            .hero p {
                font-size: 1.2rem;
            }
            nav ul {
                display: none;
            }
            .about-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .add-memory-form {
                padding: 2rem;
            }
            .categories {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="#" class="logo">Berners-Lee</a>
            <ul>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#add-memory">Add Memory</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Cherished Moments</h1>
            <p>Berners-Lee's collection of life's most precious memories, beautifully preserved and shared</p>
            <a href="#gallery" class="cta-btn">Explore Memories</a>
        </div>
    </section>

    <section id="gallery">
        <div class="container">
            <h2 class="section-title">Memory Gallery</h2>
            <div class="categories">
                <button class="category-btn active" data-category="all">All Memories</button>
                <button class="category-btn" data-category="friends">Friends</button>
                <button class="category-btn" data-category="events">Events</button>
                <button class="category-btn" data-category="personal">Personal</button>
                <button class="category-btn" data-category="others">Others</button>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Memories will be loaded here -->
            </div>
        </div>
    </section>

    <section id="add-memory">
        <div class="container">
            <h2 class="section-title">Add New Memory</h2>
            <form class="add-memory-form" id="memoryForm">
                <div class="form-group">
                    <label for="memoryType">Memory Type</label>
                    <select id="memoryType" name="type" required>
                        <option value="image" selected>Photo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Source</label>
                    <div class="source-options">
                        <label>
                            <input type="radio" name="source" value="url" checked>
                            URL
                        </label>
                        <label>
                            <input type="radio" name="source" value="upload">
                            Upload from laptop
                        </label>
                    </div>
                </div>
                <div class="form-group" id="urlGroup">
                    <label for="memoryUrl">Photo URL</label>
                    <input type="url" id="memoryUrl" name="url" placeholder="https://example.com/photo.jpg">
                </div>
                <div class="form-group" id="fileGroup" style="display: none;">
                    <label for="memoryFile">Upload Photo</label>
                    <input type="file" id="memoryFile" name="file" accept="image/*">
                </div>
                <div class="form-group">
                    <label for="memoryTitle">Memory Title</label>
                    <input type="text" id="memoryTitle" name="title" placeholder="Summer Vacation 2024" required>
                </div>
                <div class="form-group">
                    <label for="memoryDate">Date</label>
                    <input type="date" id="memoryDate" name="date" required>
                </div>
                <div class="form-group">
                    <label for="memoryCategory">Category</label>
                    <select id="memoryCategory" name="category" required>
                        <option value="">Select Category</option>
                        <option value="friends">Friends</option>
                        <option value="events">Events</option>
                        <option value="personal">Personal</option>
                        <option value="others">Others</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="memoryDescription">Description</label>
                    <textarea id="memoryDescription" name="description" placeholder="Tell the story behind this memory..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Add to Memory Gallery</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Memory Gallery. Preserving life's precious moments.</p>
        </div>
    </footer>

    <!-- Modal for viewing memories -->
    <div id="modal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImg">
        <div class="modal-caption" id="modalCaption"></div>
    </div>

    <script>
        // Memory data storage (in a real app, this would be a database)
        let memories = JSON.parse(localStorage.getItem('memories') || '[]');
        let currentCategory = 'all';

        // DOM elements
        const galleryGrid = document.getElementById('galleryGrid');
        const memoryForm = document.getElementById('memoryForm');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalCaption = document.getElementById('modalCaption');
        const categoryBtns = document.querySelectorAll('.category-btn');

        // Source selection
        const sourceRadios = document.querySelectorAll('input[name="source"]');
        const urlGroup = document.getElementById('urlGroup');
        const fileGroup = document.getElementById('fileGroup');

        sourceRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'url') {
                    urlGroup.style.display = 'block';
                    fileGroup.style.display = 'none';
                    document.getElementById('memoryUrl').required = true;
                    document.getElementById('memoryFile').required = false;
                } else {
                    urlGroup.style.display = 'none';
                    fileGroup.style.display = 'block';
                    document.getElementById('memoryUrl').required = false;
                    document.getElementById('memoryFile').required = true;
                }
            });
        });

        // Initialize gallery
        renderGallery();

        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Category filtering
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderGallery();
            });
        });

        // Form submission
        memoryForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const source = formData.get('source') || 'url';

            const processMemory = (url) => {
                const memory = {
                    id: Date.now(),
                    type: 'image',
                    url: url,
                    title: formData.get('title'),
                    date: formData.get('date'),
                    category: formData.get('category'),
                    description: formData.get('description'),
                    createdAt: new Date().toISOString()
                };

                memories.unshift(memory);
                localStorage.setItem('memories', JSON.stringify(memories));
                renderGallery();
                this.reset();

                // Reset source selection
                document.querySelector('input[name="source"][value="url"]').checked = true;
                urlGroup.style.display = 'block';
                fileGroup.style.display = 'none';
                document.getElementById('memoryUrl').required = true;
                document.getElementById('memoryFile').required = false;

                // Scroll to gallery
                document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' });
            };

            if (source === 'upload') {
                const file = document.getElementById('memoryFile').files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        processMemory(e.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            } else {
                processMemory(formData.get('url'));
            }
        });

        // Render gallery
        function renderGallery() {
            const filteredMemories = currentCategory === 'all'
                ? memories
                : memories.filter(m => m.category === currentCategory);

            galleryGrid.innerHTML = '';

            if (filteredMemories.length === 0) {
                galleryGrid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                        <h3>No memories found</h3>
                        <p>Add your first memory to get started!</p>
                        <a href="#add-memory" class="cta-btn" style="margin-top: 1rem;">Add Memory</a>
                    </div>
                `;
                return;
            }

            filteredMemories.forEach((memory, index) => {
                const memoryElement = document.createElement('div');
                memoryElement.className = 'memory-item';
                memoryElement.style.animationDelay = `${index * 0.1}s`;

                const mediaElement = `<img src="${memory.url}" alt="${memory.title}" onclick="openModal('${memory.url}', '${memory.type}', '${memory.title}', '${memory.description}', '${memory.date}')">`;

                memoryElement.innerHTML = `
                    ${mediaElement}
                    <div class="content">
                        <div class="category">${memory.category}</div>
                        <h3>${memory.title}</h3>
                        <div class="date">${formatDate(memory.date)}</div>
                        <p>${memory.description}</p>
                    </div>
                    <button class="delete-btn" onclick="deleteMemory(${memory.id})">×</button>
                `;

                galleryGrid.appendChild(memoryElement);
            });
        }

        // Modal functions
        function openModal(url, type, title, description, date) {
            modal.style.display = 'block';
            modalImg.src = url;

            modalCaption.innerHTML = `
                <h3>${title}</h3>
                <p><strong>${formatDate(date)}</strong></p>
                <p>${description}</p>
            `;
        }

        function closeModal() {
            modal.style.display = 'none';
            modalImg.src = '';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target === modal) {
                closeModal();
            }
        }

        // Delete memory
        function deleteMemory(id) {
            if (confirm('Are you sure you want to delete this memory?')) {
                memories = memories.filter(m => m.id !== id);
                localStorage.setItem('memories', JSON.stringify(memories));
                renderGallery();
            }
        }

        // Utility functions
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // Initialize gallery
        renderGallery();
    </script>
</body>
</html>
